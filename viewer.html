<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Note — NoteBase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Sidebar (same as index) -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">⬡</span>
      <span class="logo-text">NoteBase</span>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item">
        <span class="nav-icon">▦</span> All Notes
      </a>
      <a href="index.html?cat=powerapps" class="nav-item" data-filter="powerapps">
        <span class="nav-icon">⚡</span> Power Apps
      </a>
      <a href="index.html?cat=powerautomate" class="nav-item" data-filter="powerautomate">
        <span class="nav-icon">↻</span> Power Automate
      </a>
      <a href="index.html?cat=powerbi" class="nav-item" data-filter="powerbi">
        <span class="nav-icon">◈</span> Power BI
      </a>
      <a href="index.html?cat=sharepoint" class="nav-item" data-filter="sharepoint">
        <span class="nav-icon">◇</span> SharePoint
      </a>
      <a href="index.html?cat=other" class="nav-item" data-filter="other">
        <span class="nav-icon">○</span> Other
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">
        <span id="themeIcon">☀</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main">
    <a href="index.html" class="viewer-back">← Back to all notes</a>

    <div id="noteContainer">
      <div class="viewer-header">
        <div class="viewer-meta">
          <span class="card-category" id="viewerCategory">...</span>
          <span class="viewer-date" id="viewerDate"></span>
        </div>
        <h1 class="viewer-title" id="viewerTitle">Loading...</h1>
        <div class="card-tags" id="viewerTags"></div>
      </div>

      <article class="note-content" id="noteContent">
        <p style="color: var(--text-muted);">Loading note...</p>
      </article>
    </div>
  </main>

  <!-- marked.js for Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="notes-data.js"></script>
  <script>
    // ─── Theme ──────────────────────────────
    const saved = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
    const themeIcon = document.getElementById('themeIcon');
    themeIcon.textContent = saved === 'dark' ? '☀' : '☾';

    document.getElementById('themeToggle').addEventListener('click', () => {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      themeIcon.textContent = next === 'dark' ? '☀' : '☾';
    });

    // ─── Load Note ───────────────────────────
    const params = new URLSearchParams(window.location.search);
    const noteId = params.get('note');
    const note   = NOTES.find(n => n.id === noteId);

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    if (!note) {
      document.getElementById('viewerTitle').textContent = 'Note not found';
      document.getElementById('noteContent').innerHTML = '<p>This note does not exist. <a href="index.html">Go back home.</a></p>';
    } else {
      document.title = `${note.title} — NoteBase`;
      document.getElementById('viewerTitle').textContent = note.title;
      document.getElementById('viewerDate').textContent  = formatDate(note.date);

      const catEl = document.getElementById('viewerCategory');
      catEl.textContent = note.categoryLabel;
      catEl.className   = `card-category cat-${note.category}`;

      const tagsEl = document.getElementById('viewerTags');
      tagsEl.innerHTML = note.tags.map(t => `<span class="tag">${t}</span>`).join('');

      // Fetch and render the markdown file
      fetch(note.file)
        .then(r => {
          if (!r.ok) throw new Error('File not found');
          return r.text();
        })
        .then(md => {
          document.getElementById('noteContent').innerHTML = marked.parse(md);
        })
        .catch(() => {
          document.getElementById('noteContent').innerHTML = `
            <p style="color:var(--text-muted)">
              Markdown file not found at <code>${note.file}</code>.<br><br>
              Create the file at that path and it will render here automatically.
            </p>
          `;
        });
    }
  </script>
</body>
</html>
