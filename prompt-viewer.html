<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prompt — Knowledge Base</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .prompt-copy-btn {
      background: #16a34a; color: #fff; border: none; padding: 8px 20px;
      border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s;
    }
    .prompt-copy-btn:hover { background: #15803d; }
    .prompt-copy-btn.copied { background: #0891b2; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark kb-navbar">
    <div class="container">
      <a class="navbar-brand kb-brand" href="index.html"><i class="bi bi-journal-bookmark-fill"></i> Vandam's Knowledge Base</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house"></i> Home</a></li>
          <li class="nav-item"><a class="nav-link" href="new-prompt.html"><i class="bi bi-chat-square-text"></i> New Prompt</a></li>
          <li class="nav-item"><a class="nav-link" href="manage-prompts.html"><i class="bi bi-pencil-square"></i> Manage Prompts</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <div class="kb-breadcrumb">
    <div class="container">
      <a href="index.html">Home</a><span class="sep">/</span>
      <span id="bcCat" class="text-muted">Prompts</span><span class="sep">/</span>
      <span id="bcTitle" class="text-muted">Loading...</span>
    </div>
  </div>

  <div class="container kb-main">
    <div class="row">
      <div class="col-lg-8">
        <div class="kb-article-header">
          <div class="kb-article-meta">
            <span class="kb-badge" id="viewerBadge" style="background:#f0fdf4;color:#16a34a;">...</span>
            <span id="viewerDate" class="text-muted small ms-auto"></span>
          </div>
          <h1 class="kb-article-title" id="viewerTitle">Loading...</h1>
        </div>

        <!-- Copy button -->
        <div class="mb-3 d-flex gap-2">
          <button class="prompt-copy-btn" onclick="copyPrompt()">
            <i class="bi bi-clipboard"></i><span id="copyBtnText">Copy Prompt Text</span>
          </button>
          <a href="#" id="editBtn" class="btn btn-outline-primary btn-sm"><i class="bi bi-pencil me-1"></i>Edit</a>
          <button onclick="deletePrompt()" class="btn btn-outline-danger btn-sm"><i class="bi bi-trash me-1"></i>Delete</button>
        </div>

        <div class="kb-article-body" id="promptContent">
          <div class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm me-2"></div> Loading...</div>
        </div>

        <div class="mt-3">
          <a href="index.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="kb-sidebar-box">
          <h6 class="kb-sidebar-title"><i class="bi bi-chat-square-text"></i> More Prompts</h6>
          <ul class="kb-sidebar-list" id="morePrompts"></ul>
        </div>
      </div>
    </div>
  </div>

  <footer class="kb-footer mt-5"><div class="container text-center"><p class="mb-0 small">Vandam's Knowledge Base &copy; 2026</p></div></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const GITHUB_USER = 'vandam2', GITHUB_REPO = 'vandam2.github.io', GITHUB_BRANCH = 'main';
    function getToken() { return localStorage.getItem('gh_token') || ''; }

    async function ghGet(path) {
      const r = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${path}?t=${Date.now()}`, {
        headers: { Authorization: `token ${getToken()}`, Accept: 'application/vnd.github.v3+json' }
      });
      if (!r.ok) throw new Error(`GET failed: ${r.status}`);
      return r.json();
    }
    async function ghDelete(path, msg, sha) {
      const r = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${path}`, {
        method: 'DELETE',
        headers: { Authorization: `token ${getToken()}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, sha, branch: GITHUB_BRANCH })
      });
      if (!r.ok) { const e = await r.json(); throw new Error(e.message); }
    }
    async function ghPut(path, content, msg, sha) {
      const body = { message: msg, content: btoa(unescape(encodeURIComponent(content))), branch: GITHUB_BRANCH };
      if (sha) body.sha = sha;
      const r = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${path}`, {
        method: 'PUT', headers: { Authorization: `token ${getToken()}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!r.ok) { const e = await r.json(); throw new Error(e.message); }
    }

    function copyPrompt() {
      const text = document.getElementById('promptContent').innerText;
      navigator.clipboard.writeText(text);
      const btn = document.getElementById('copyBtnText');
      btn.textContent = 'Copied!';
      document.querySelector('.prompt-copy-btn').classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy Prompt Text'; document.querySelector('.prompt-copy-btn').classList.remove('copied'); }, 2500);
    }

    async function deletePrompt() {
      if (!getToken()) { alert('Please set your GitHub token in Manage Prompts first.'); return; }
      if (!confirm(`Delete "${window._prompt?.title}"?`)) return;
      const p = window._prompt;
      try {
        try { const f = await ghGet(p.file); await ghDelete(p.file, `Delete prompt: ${p.title}`, f.sha); } catch(e) {}
        await new Promise(r => setTimeout(r, 3000));
        const df = await ghGet('prompts-data.js');
        let js = decodeURIComponent(escape(atob(df.content.replace(/\n/g,''))));
        js = js.replace(new RegExp(`\\s*\\{[^{}]*?id:\\s*"${p.id}"[^{}]*?\\}\\s*,?`, 's'), '');
        await ghPut('prompts-data.js', js, `Delete prompt: ${p.title}`, df.sha);
        alert('Deleted! Redirecting...');
        window.location.href = 'index.html';
      } catch(err) { alert('Error: ' + err.message); }
    }

    function init() {
      const params = new URLSearchParams(window.location.search);
      const prompt = PROMPTS.find(p => p.id === params.get('prompt'));
      if (!prompt) { document.getElementById('viewerTitle').textContent = 'Prompt not found'; return; }
      window._prompt = prompt;

      document.title = `${prompt.title} — Knowledge Base`;
      document.getElementById('bcCat').textContent = prompt.categoryLabel;
      document.getElementById('bcTitle').textContent = prompt.title;
      document.getElementById('viewerTitle').textContent = prompt.title;
      document.getElementById('viewerDate').textContent = prompt.date ? new Date(prompt.date).toLocaleDateString('en-CA', {month:'short',day:'numeric',year:'numeric'}) : '';
      document.getElementById('viewerBadge').textContent = prompt.categoryLabel;
      document.getElementById('editBtn').href = `edit-prompt.html?prompt=${prompt.id}`;

      // More prompts sidebar
      const more = PROMPTS.filter(p => p.id !== prompt.id).slice(0, 6);
      document.getElementById('morePrompts').innerHTML = more.length === 0
        ? '<li class="text-muted small">No other prompts yet</li>'
        : more.map(p => `<li><a href="prompt-viewer.html?prompt=${p.id}"><i class="bi bi-chat-square-text"></i>${p.title}</a></li>`).join('');

      fetch(`${prompt.file}?t=${Date.now()}`)
        .then(r => { if (!r.ok) throw new Error(); return r.text(); })
        .then(content => {
          const el = document.getElementById('promptContent');
          el.innerHTML = content.trim().startsWith('<') ? content : `<p>${content}</p>`;
        })
        .catch(() => {
          document.getElementById('promptContent').innerHTML = `<p class="text-muted">Content not found. <a href="edit-prompt.html?prompt=${prompt.id}">Click Edit to add content.</a></p>`;
        });
    }

    const _s = document.createElement('script');
    _s.src = 'prompts-data.js?v=' + Date.now();
    _s.onload = init;
    document.body.appendChild(_s);
  </script>
</body>
</html>
