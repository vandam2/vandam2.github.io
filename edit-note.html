<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Note — NoteBase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo"><span class="logo-icon">⬡</span><span class="logo-text">NoteBase</span></div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item"><span class="nav-icon">▦</span> All Notes</a>
      <a href="index.html?cat=powerapps" class="nav-item"><span class="nav-icon">⚡</span> Power Apps</a>
      <a href="index.html?cat=powerautomate" class="nav-item"><span class="nav-icon">↻</span> Power Automate</a>
      <a href="index.html?cat=powerbi" class="nav-item"><span class="nav-icon">◈</span> Power BI</a>
      <a href="index.html?cat=sharepoint" class="nav-item"><span class="nav-icon">◇</span> SharePoint</a>
      <a href="index.html?cat=other" class="nav-item"><span class="nav-icon">○</span> Other</a>
    </nav>
    <div class="sidebar-footer"><button class="theme-toggle" id="themeToggle"><span id="themeIcon">☀</span></button></div>
  </aside>

  <main class="main">
    <a href="#" id="backLink" class="viewer-back">← Back to note</a>
    <div class="page-header" style="margin-bottom:28px;">
      <p class="header-label">EDIT NOTE</p>
      <h1 class="header-title" id="pageTitle">Edit</h1>
    </div>

    <div class="form-section">
      <!-- GitHub Token -->
      <div class="token-box">
        <div class="token-box-header">
          <span class="token-box-title">🔑 GitHub Connection</span>
          <span class="token-status unset" id="tokenStatus">Not set</span>
        </div>
        <div class="token-input-row">
          <input type="password" class="form-input" id="tokenInput" placeholder="Paste your GitHub Personal Access Token..." />
          <button class="btn-save btn-sm" onclick="saveToken()">Save</button>
        </div>
        <p class="token-hint"><a href="https://github.com/settings/tokens/new?scopes=repo&description=NoteBase" target="_blank">Create token</a> with <strong>repo</strong> scope.</p>
      </div>

      <div class="form-group">
        <label class="form-label">Note Title *</label>
        <input type="text" class="form-input" id="noteTitle" />
      </div>

      <div class="form-row-3">
        <div class="form-group">
          <label class="form-label">Category *</label>
          <select class="form-select" id="noteCategory" onchange="updateSubcategories()">
            <option value="powerapps" data-label="Power Apps">Power Apps</option>
            <option value="powerautomate" data-label="Power Automate">Power Automate</option>
            <option value="powerbi" data-label="Power BI">Power BI</option>
            <option value="sharepoint" data-label="SharePoint">SharePoint</option>
            <option value="other" data-label="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Subcategory</label>
          <select class="form-select" id="noteSubcategory"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Date</label>
          <input type="date" class="form-input" id="noteDate" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Short Description *</label>
        <input type="text" class="form-input" id="noteExcerpt" />
      </div>

      <div class="form-group">
        <label class="form-label">Tags (comma separated)</label>
        <input type="text" class="form-input" id="noteTags" />
      </div>

      <div class="form-group">
        <label class="form-label">Note Content</label>
        <div class="editor-wrap">
          <div id="editor"></div>
        </div>
        <p class="form-hint" id="loadingHint" style="color:var(--accent)">⏳ Loading current content from GitHub...</p>
      </div>

      <div class="form-actions">
        <button class="btn-save" id="saveBtn" onclick="saveNote()">
          <span id="saveBtnText">⬆ Save Changes to GitHub</span>
        </button>
        <button class="btn-danger" onclick="deleteNote()">✕ Delete Note</button>
        <a href="#" id="cancelLink" class="btn-secondary">Cancel</a>
      </div>

      <div class="status-msg" id="statusMsg"></div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>
  <script>
    const GITHUB_USER = 'vandam2', GITHUB_REPO = 'vandam2.github.io', GITHUB_BRANCH = 'main';

    // Theme
    const saved = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
    document.getElementById('themeIcon').textContent = saved === 'dark' ? '☀' : '☾';
    document.getElementById('themeToggle').addEventListener('click', () => {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.getElementById('themeIcon').textContent = next === 'dark' ? '☀' : '☾';
    });

    // Quill
    const quill = new Quill('#editor', {
      theme: 'snow',
      placeholder: 'Your note content will load here...',
      modules: {
        toolbar: [
          [{ header: [1, 2, 3, false] }],
          ['bold', 'italic', 'underline'],
          [{ list: 'ordered' }, { list: 'bullet' }],
          ['code-block', 'blockquote'],
          ['link', 'image'],
          ['clean']
        ]
      }
    });

    // Token
    function getToken() { return localStorage.getItem('gh_token') || ''; }
    function saveToken() {
      const v = document.getElementById('tokenInput').value.trim();
      if (!v) return;
      localStorage.setItem('gh_token', v);
      document.getElementById('tokenInput').value = '';
      updateTokenStatus();
      // Load note content now that we have a token
      if (window._note) loadNoteContent();
    }
    function updateTokenStatus() {
      const el = document.getElementById('tokenStatus');
      const has = !!getToken();
      el.textContent = has ? '✓ Connected' : 'Not set';
      el.className = has ? 'token-status set' : 'token-status unset';
    }
    updateTokenStatus();

    // GitHub API
    async function ghGet(path) {
      const r = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${path}?t=${Date.now()}`, {
        headers: { Authorization: `token ${getToken()}`, Accept: 'application/vnd.github.v3+json' }
      });
      if (!r.ok) throw new Error(`GET ${path} failed: ${r.status}`);
      return r.json();
    }
    async function ghPut(path, content, msg, sha) {
      const body = { message: msg, content: btoa(unescape(encodeURIComponent(content))), branch: GITHUB_BRANCH };
      if (sha) body.sha = sha;
      const r = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${path}`, {
        method: 'PUT',
        headers: { Authorization: `token ${getToken()}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!r.ok) { const e = await r.json(); throw new Error(e.message || `PUT failed`); }
    }
    async function ghDelete(path, msg, sha) {
      const r = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${path}`, {
        method: 'DELETE',
        headers: { Authorization: `token ${getToken()}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, sha, branch: GITHUB_BRANCH })
      });
      if (!r.ok) { const e = await r.json(); throw new Error(e.message || `Delete failed`); }
    }

    function setStatus(type, msg) {
      const el = document.getElementById('statusMsg');
      el.className = `status-msg ${type}`;
      el.innerHTML = type === 'saving' ? `<div class="spinner"></div> ${msg}` :
                     type === 'success' ? `<span>✅</span> ${msg}` : msg;
    }

    function updateSubcategories(keepVal) {
      const cat = document.getElementById('noteCategory').value;
      const sub = document.getElementById('noteSubcategory');
      const cur = keepVal || sub.value;
      sub.innerHTML = (SUBCATEGORIES[cat] || ['Other']).map(s => `<option value="${s}"${s===cur?' selected':''}>${s}</option>`).join('');
    }

    async function loadNoteContent() {
      const note = window._note;
      if (!note || !getToken()) return;
      try {
        // Try to load from GitHub directly (always fresh)
        const f = await ghGet(note.file);
        const content = decodeURIComponent(escape(atob(f.content.replace(/\n/g,''))));
        window._fileSha = f.sha;
        if (content.trim().startsWith('<')) {
          quill.root.innerHTML = content;
        } else {
          quill.root.innerHTML = content.split('\n\n').map(p => `<p>${p}</p>`).join('');
        }
        document.getElementById('loadingHint').textContent = '✓ Content loaded from GitHub';
        document.getElementById('loadingHint').style.color = '#22c55e';
      } catch(e) {
        document.getElementById('loadingHint').textContent = 'Could not load content — write fresh content above.';
        document.getElementById('loadingHint').style.color = 'var(--text-muted)';
      }
    }

    async function saveNote() {
      if (!getToken()) { alert('Please set your GitHub token first.'); return; }
      const note    = window._note;
      const title   = document.getElementById('noteTitle').value.trim();
      const cat     = document.getElementById('noteCategory').value;
      const catLbl  = document.getElementById('noteCategory').selectedOptions[0].dataset.label;
      const subcat  = document.getElementById('noteSubcategory').value;
      const excerpt = document.getElementById('noteExcerpt').value.trim();
      const tagsRaw = document.getElementById('noteTags').value.trim();
      const date    = document.getElementById('noteDate').value;
      const content = quill.root.innerHTML;
      if (!title || !excerpt) { alert('Please fill in Title and Description.'); return; }

      const tags = tagsRaw ? tagsRaw.split(',').map(t => `"${t.trim()}"`) : ['"general"'];
      const btn  = document.getElementById('saveBtn');
      btn.disabled = true;
      document.getElementById('saveBtnText').textContent = 'Saving...';
      setStatus('saving', 'Updating note file...');

      try {
        // Update the content file
        const fileData = await ghGet(note.file);
        await ghPut(note.file, content, `Update note: ${title}`, fileData.sha);
        setStatus('saving', 'Updating notes catalog...');
        await new Promise(r => setTimeout(r, 800));

        const newEntry = `  {\n    id: "${note.id}",\n    title: "${title}",\n    category: "${cat}",\n    categoryLabel: "${catLbl}",\n    subcategory: "${subcat}",\n    excerpt: "${excerpt.replace(/"/g,'\\"')}",\n    tags: [${tags.join(', ')}],\n    file: "${note.file}",\n    date: "${date}"\n  }`;

        let attempts = 0;
        while (attempts < 4) {
          try {
            const dataFile = await ghGet('notes-data.js');
            let js = decodeURIComponent(escape(atob(dataFile.content.replace(/\n/g,''))));
            const pat = new RegExp(`\\s*\\{[^{}]*?id:\\s*"${note.id}"[^{}]*?\\}\\s*,?`, 's');
            js = js.replace(pat, `\n${newEntry},`);
            await ghPut('notes-data.js', js, `Update note entry: ${title}`, dataFile.sha);
            break;
          } catch(e) {
            attempts++;
            if (attempts >= 4) throw e;
            setStatus('saving', `Retrying... (${attempts}/3)`);
            await new Promise(r => setTimeout(r, 2000));
          }
        }

        setStatus('success', `Saved! <a href="viewer.html?note=${note.id}" style="color:var(--accent);margin-left:8px;">← View note</a>`);
        btn.disabled = false;
        document.getElementById('saveBtnText').textContent = '⬆ Save Changes to GitHub';

      } catch(err) {
        setStatus('error', `<strong>Error:</strong> ${err.message}`);
        btn.disabled = false;
        document.getElementById('saveBtnText').textContent = '⬆ Save Changes to GitHub';
      }
    }

    async function deleteNote() {
      if (!getToken()) { alert('Please set your GitHub token first.'); return; }
      if (!confirm(`Delete "${window._note?.title}"? Cannot be undone.`)) return;
      setStatus('saving', 'Deleting note...');
      try {
        try {
          const f = await ghGet(window._note.file);
          await ghDelete(window._note.file, `Delete note: ${window._note.title}`, f.sha);
        } catch(e) { console.log('file skip'); }
        await new Promise(r => setTimeout(r, 3000));
        const dataFile = await ghGet('notes-data.js');
        let js = decodeURIComponent(escape(atob(dataFile.content.replace(/\n/g,''))));
        js = js.replace(new RegExp(`\\s*\\{[^{}]*?id:\\s*"${window._note.id}"[^{}]*?\\}\\s*,?`, 's'), '');
        await ghPut('notes-data.js', js, `Delete note: ${window._note.title}`, dataFile.sha);
        setStatus('success', '✅ Deleted! Redirecting...');
        setTimeout(() => { window.location.href = 'index.html'; }, 2500);
      } catch(err) {
        setStatus('error', `<strong>Error:</strong> ${err.message}`);
      }
    }

    // Init
    function init() {
      // Re-check token status on load
      updateTokenStatus();

      const params = new URLSearchParams(window.location.search);
      const noteId = params.get('note');
      const note = NOTES.find(n => n.id === noteId);

      if (!note) {
        document.getElementById('pageTitle').textContent = 'Note not found';
        document.getElementById('loadingHint').textContent = `Could not find note with id: "${noteId}" in notes-data.js`;
        document.getElementById('loadingHint').style.color = '#ef4444';
        return;
      }

      window._note = note;
      document.title = `Edit: ${note.title} — NoteBase`;
      document.getElementById('pageTitle').textContent = note.title;
      document.getElementById('noteTitle').value   = note.title;
      document.getElementById('noteExcerpt').value = note.excerpt;
      document.getElementById('noteTags').value    = note.tags.join(', ');
      document.getElementById('noteDate').value    = note.date;
      document.getElementById('backLink').href     = `viewer.html?note=${note.id}`;
      document.getElementById('cancelLink').href   = `viewer.html?note=${note.id}`;

      // Set category then subcategory
      const catSel = document.getElementById('noteCategory');
      for (let o of catSel.options) { if (o.value === note.category) { o.selected = true; break; } }
      updateSubcategories(note.subcategory);

      // Load content if token already saved
      if (getToken()) {
        loadNoteContent();
      } else {
        document.getElementById('loadingHint').textContent = '→ Set your GitHub token above to load note content.';
        document.getElementById('loadingHint').style.color = 'var(--text-muted)';
      }
    }

    const _s = document.createElement('script');
    _s.src = 'notes-data.js?v=' + Date.now();
    _s.onload = init;
    document.body.appendChild(_s);
  </script>
</body>
</html>
