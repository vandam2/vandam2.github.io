<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vandam's Knowledge Base</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">⬡</span>
      <span class="logo-text">NoteBase</span>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item active" data-filter="all"><span class="nav-icon">▦</span> All Notes</a>
      <a href="#" class="nav-item" data-filter="powerapps"><span class="nav-icon">⚡</span> Power Apps</a>
      <a href="#" class="nav-item" data-filter="powerautomate"><span class="nav-icon">↻</span> Power Automate</a>
      <a href="#" class="nav-item" data-filter="powerbi"><span class="nav-icon">◈</span> Power BI</a>
      <a href="#" class="nav-item" data-filter="sharepoint"><span class="nav-icon">◇</span> SharePoint</a>
      <a href="#" class="nav-item" data-filter="other"><span class="nav-icon">○</span> Other</a>
    </nav>
    <div class="sidebar-footer">
      <button class="theme-toggle" id="themeToggle"><span id="themeIcon">☀</span></button>
      <span class="note-count" id="totalCount">0 notes</span>
    </div>
  </aside>

  <main class="main">
    <header class="page-header">
      <div class="header-top">
        <div>
          <p class="header-label">PERSONAL KNOWLEDGE BASE</p>
          <h1 class="header-title">My Notes</h1>
        </div>
        <a href="new-note.html" class="btn-new">+ New Note</a>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" class="search-input" placeholder="Search notes, categories, tags..." autocomplete="off"/>
        <kbd class="search-kbd">⌘K</kbd>
      </div>
      <div class="category-tabs" id="categoryTabs">
        <button class="tab active" data-filter="all">All</button>
        <button class="tab" data-filter="powerapps">Power Apps</button>
        <button class="tab" data-filter="powerautomate">Power Automate</button>
        <button class="tab" data-filter="powerbi">Power BI</button>
        <button class="tab" data-filter="sharepoint">SharePoint</button>
        <button class="tab" data-filter="other">Other</button>
      </div>
    </header>

    <section class="grid-section">
      <div class="results-bar"><span id="resultCount">Loading...</span></div>
      <div class="card-grid" id="cardGrid"></div>
      <div class="empty-state" id="emptyState" style="display:none;">
        <div class="empty-icon">∅</div>
        <p>No notes found</p>
        <small>Try a different search or category</small>
      </div>
    </section>
  </main>

  <script>
    // Load notes-data.js fresh every time — no caching
    const s = document.createElement('script');
    s.src = 'notes-data.js?v=' + Date.now();
    s.onload = function() {
      const s2 = document.createElement('script');
      s2.src = 'script.js?v=' + Date.now();
      document.body.appendChild(s2);
    };
    document.body.appendChild(s);
  </script>
</body>
</html>
